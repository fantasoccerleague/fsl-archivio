<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSL · Archivio Storico — Fanta Soccer League</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=Archivo+Narrow:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#edf2f7;--bg2:#ffffff;--panel:#ffffff;--panel2:#f3f7fb;--line:rgba(18,44,66,.14);--line2:rgba(18,44,66,.23);--ink:#13202d;--muted:#4a5c69;--faint:#697986;--green:#088259;--green-deep:#076b4d;--gold:#9c6a08;--gold-deep:#7d5408;--red:#d8322f;--blue:#1f6fd0;--shadow:0 14px 36px -22px rgba(20,50,80,.26)}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:'Archivo',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(900px 500px at 80% -10%, rgba(14,168,132,.13), transparent 60%),radial-gradient(700px 600px at -10% 100%, rgba(42,127,224,.09), transparent 55%),repeating-linear-gradient(0deg, rgba(18,44,66,.03) 0 1px, transparent 1px 80px)}
  ::selection{background:var(--green);color:#04130c}
  a{color:inherit;text-decoration:none}
  header.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .nav-inner{max-width:1280px;margin:0 auto;padding:0 22px;height:64px;display:flex;align-items:center;gap:22px}
  .brand{display:flex;align-items:center;gap:11px;cursor:pointer;flex-shrink:0}
  .crest{width:38px;height:38px;border-radius:9px;background:linear-gradient(145deg,var(--green),var(--green-deep));display:grid;place-items:center;font-family:'Anton';font-size:17px;color:#03130c;box-shadow:0 6px 18px -6px rgba(14,168,132,.45);letter-spacing:.5px}
  .brand b{font-family:'Anton';font-size:20px;letter-spacing:1px}
  .brand span{display:block;font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:-2px}
  nav.links{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
  nav.links a{padding:8px 13px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--muted);transition:.18s;letter-spacing:.2px;white-space:nowrap;cursor:pointer}
  nav.links a:hover{color:var(--ink);background:rgba(18,44,66,.06)}
  nav.links a.active{color:#04130c;background:var(--green)}
  .season-select{margin-left:6px;background:var(--panel);border:1px solid var(--line2);border-radius:8px;padding:7px 11px;font-family:'Archivo',sans-serif;font-size:13px;font-weight:700;color:var(--gold);cursor:pointer;font-variant-numeric:tabular-nums;outline:none}
  .season-select:hover{border-color:var(--gold)}
  main{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:0 22px 90px}
  .view{display:none;animation:fade .45s ease both}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .hero{padding:64px 0 30px;position:relative}
  .hero .eyebrow{font-family:'Archivo Narrow';letter-spacing:5px;text-transform:uppercase;font-size:13px;color:var(--green);font-weight:700;margin-bottom:14px}
  .hero h1{font-family:'Anton';font-weight:400;line-height:.92;font-size:clamp(54px,9vw,128px);letter-spacing:1px;text-transform:uppercase}
  .hero h1 em{font-style:normal;color:var(--green-deep)}
  .hero .sub{margin-top:20px;max-width:560px;color:var(--muted);font-size:17px;line-height:1.6}
  .hero .sub b{color:var(--ink);font-weight:600}
  .statbar{display:flex;gap:34px;margin-top:40px;flex-wrap:wrap;padding-top:26px;border-top:1px solid var(--line)}
  .statbar .s b{display:block;font-family:'Anton';font-size:34px;color:var(--gold);line-height:1}
  .statbar .s span{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);font-weight:600}
  .sec-head{margin:54px 0 22px;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .sec-head h2{font-family:'Anton';font-size:30px;letter-spacing:.5px;text-transform:uppercase}
  .sec-head .kicker{font-family:'Archivo Narrow';letter-spacing:4px;font-size:12px;text-transform:uppercase;color:var(--green);font-weight:700;margin-bottom:6px}
  .sec-head p{color:var(--muted);font-size:14px;max-width:460px;text-align:right}
  .albo{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  @media(max-width:880px){.albo{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:480px){.albo{grid-template-columns:1fr}}
  .trophy-card{position:relative;border-radius:16px;padding:22px;overflow:hidden;background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line2);box-shadow:var(--shadow);transition:.25s}
  .trophy-card:hover{transform:translateY(-4px);border-color:rgba(201,137,17,.45)}
  .trophy-card::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(201,137,17,.16),transparent 70%)}
  .trophy-card .ico{font-size:26px;margin-bottom:14px}
  .trophy-card .comp{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-weight:700}
  .trophy-card .win{font-family:'Anton';font-size:25px;line-height:1.05;margin-top:8px;letter-spacing:.4px}
  .trophy-card .role{margin-top:10px;font-size:12px;color:var(--gold);font-weight:600;letter-spacing:.4px}
  .comp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:880px){.comp-grid{grid-template-columns:1fr 1fr}}
  @media(max-width:560px){.comp-grid{grid-template-columns:1fr}}
  .comp-card{cursor:pointer;border-radius:16px;padding:24px;position:relative;overflow:hidden;background:linear-gradient(155deg,var(--panel),var(--panel2));border:1px solid var(--line);transition:.25s;min-height:150px;display:flex;flex-direction:column;justify-content:space-between}
  .comp-card:hover{transform:translateY(-4px);border-color:var(--green);box-shadow:0 22px 46px -24px rgba(14,168,132,.30)}
  .comp-card .tag{font-family:'Archivo Narrow';font-size:12px;letter-spacing:3px;font-weight:700;color:var(--green)}
  .comp-card h3{font-family:'Anton';font-size:26px;letter-spacing:.5px;margin:10px 0 6px;text-transform:uppercase}
  .comp-card p{font-size:13px;color:var(--muted)}
  .comp-card .go{margin-top:16px;font-size:13px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px}
  .comp-card .go .arr{transition:.25s}
  .comp-card:hover .go .arr{transform:translateX(5px);color:var(--green)}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:8px 0 18px}
  .tabs{display:flex;flex-wrap:wrap;gap:4px;background:var(--panel2);padding:4px;border-radius:11px;border:1px solid var(--line)}
  @media(max-width:620px){.controls .tabs{width:100%}.controls .tabs button{flex:1 1 38%;text-align:center;padding:9px 8px;font-size:12.5px;line-height:1.15}}
  .tabs button{border:0;background:transparent;color:var(--muted);font-family:inherit;font-weight:700;font-size:13px;padding:8px 16px;border-radius:8px;cursor:pointer;transition:.18s;letter-spacing:.3px}
  .tabs button:hover{color:var(--ink)}
  .tabs button.on{background:var(--green);color:#04130c}
  .search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 13px;min-width:210px}
  .search input{background:transparent;border:0;outline:0;color:var(--ink);font-family:inherit;font-size:14px;width:100%}
  .search input::placeholder{color:var(--faint)}
  .search .mag{color:var(--faint);font-size:14px}
  .table-wrap{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--panel2);box-shadow:var(--shadow)}
  .scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums;min-width:680px}
  thead th{background:#e6edf3;color:var(--muted);font-size:11px;letter-spacing:1.2px;text-transform:uppercase;font-weight:700;padding:13px 10px;text-align:right;cursor:pointer;user-select:none;white-space:nowrap;border-bottom:1px solid var(--line2);transition:.15s}
  thead th:hover{color:var(--ink)}
  thead th.lft{text-align:left}
  thead th .ar{opacity:0;font-size:9px;margin-left:3px}
  thead th.sorted .ar{opacity:1;color:var(--green)}
  tbody td{padding:12px 10px;text-align:right;border-bottom:1px solid rgba(18,44,66,.08);font-size:14px;white-space:nowrap}
  tbody tr:last-child td{border-bottom:0}
  tbody tr{transition:.12s}
  tbody tr:hover{background:rgba(18,44,66,.045)}
  td.team{text-align:left;font-weight:600;letter-spacing:.2px}
  td.pos{text-align:center;color:var(--muted);font-weight:700;width:42px}
  td.pts{font-weight:800;color:var(--gold);font-size:15px}
  .pos-wrap{display:inline-flex;align-items:center;gap:9px}
  .zbar{width:4px;height:20px;border-radius:3px;background:transparent;flex-shrink:0}
  .z-champions .zbar{background:var(--green)}
  .z-promo .zbar{background:linear-gradient(var(--green),var(--gold))}
  .z-relegation .zbar{background:var(--red)}
  .z-ottavi .zbar{background:var(--green)}
  .z-playoff .zbar{background:var(--gold)}
  .z-elim .zbar{background:var(--red)}
  td.dg.pos-v{color:var(--green)}
  td.dg.neg-v{color:var(--red)}
  .delta{font-weight:700;font-size:13px}
  .delta.up{color:var(--green)} .delta.down{color:var(--red)} .delta.eq{color:var(--faint)}
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:7px}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  /* giornata explorer */
  .gnav{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .gnav button{width:40px;height:40px;border-radius:10px;border:1px solid var(--line2);background:var(--panel2);color:var(--ink);font-size:15px;cursor:pointer;transition:.15s}
  .gnav button:hover{border-color:var(--green);color:var(--green)}
  .gnav button:disabled{opacity:.3;cursor:default;border-color:var(--line)}
  .gnav select{background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:9px 13px;color:var(--ink);font-family:inherit;font-weight:700;font-size:14px;outline:none;cursor:pointer}
  .gnav .glabel{font-family:'Archivo Narrow';letter-spacing:2px;text-transform:uppercase;font-size:13px;color:var(--muted);font-weight:600}
  .gnav .gserie{margin-left:auto;font-size:12px;color:var(--faint);letter-spacing:1px}
  .exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
  @media(max-width:900px){.exp-grid{grid-template-columns:1fr}}
  .panel-title{font-family:'Archivo Narrow';letter-spacing:3px;text-transform:uppercase;font-size:12px;color:var(--green);font-weight:700;margin-bottom:12px}
  .match{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(18,44,66,.08);font-size:13.5px}
  .match:last-child{border-bottom:0}
  .match .h{flex:1;text-align:right;font-weight:600}
  .match .a{flex:1;text-align:left;font-weight:600}
  .match .sc{font-family:'Anton';font-size:15px;letter-spacing:1px;background:#eef3f8;border-radius:7px;padding:3px 9px;min-width:46px;text-align:center}
  .match .win{color:var(--green)}
  .match .fp{font-size:10.5px;color:var(--faint);font-variant-numeric:tabular-nums;display:block;font-weight:500}
  .rounds{display:flex;flex-direction:column;gap:30px}
  .round h3{font-family:'Anton';font-size:21px;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;color:var(--ink);display:flex;align-items:center;gap:12px}
  .round h3::before{content:"";width:26px;height:3px;background:var(--green);border-radius:2px}
  .ties{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .tie{background:var(--panel2);border:1px solid var(--line);border-radius:13px;overflow:hidden}
  .leg{display:flex;align-items:center;padding:10px 14px;gap:10px;font-size:13.5px}
  .leg+.leg{border-top:1px solid rgba(18,44,66,.08)}
  .leg .nm{flex:1;font-weight:600}
  .leg .nm.r{text-align:right}
  .leg .sc{font-family:'Anton';font-size:15px;min-width:20px;text-align:center;color:var(--ink);letter-spacing:1px}
  .leg .fp{font-size:10px;color:var(--faint);display:block;font-weight:500}
  .leg .win{color:var(--green)}
  .tie .res{background:#eef3f8;padding:8px 14px;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);font-weight:700}
  .tie.is-final{border-color:rgba(201,137,17,.45);box-shadow:0 0 26px -12px var(--gold)}
  .champion-banner{margin-top:34px;text-align:center;padding:40px 20px;border-radius:18px;position:relative;overflow:hidden;background:linear-gradient(160deg,rgba(201,137,17,.16),rgba(14,168,132,.12));border:1px solid rgba(201,137,17,.40)}
  .champion-banner .lbl{font-family:'Archivo Narrow';letter-spacing:5px;text-transform:uppercase;font-size:13px;color:var(--gold);font-weight:700}
  .champion-banner .nm{font-family:'Anton';font-size:clamp(34px,6vw,58px);letter-spacing:1px;text-transform:uppercase;margin-top:8px;background:linear-gradient(120deg,var(--green-deep),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  .champion-banner .tro{font-size:34px;margin-bottom:8px}
  .qual{margin-top:26px;background:var(--panel2);border:1px solid var(--line2);border-radius:14px;padding:22px}
  .qual h4{font-family:'Archivo Narrow';letter-spacing:3px;text-transform:uppercase;color:var(--green);font-size:13px;margin-bottom:14px}
  .qual .chips{display:flex;flex-wrap:wrap;gap:9px}
  .qual .chip{background:rgba(14,168,132,.12);border:1px solid rgba(14,168,132,.34);color:var(--ink);padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600}
  .groups{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:820px){.groups{grid-template-columns:1fr}}
  .grp-title{font-family:'Anton';font-size:19px;letter-spacing:1px;margin-bottom:10px;color:var(--gold)}
  footer{max-width:1280px;margin:0 auto;padding:34px 22px;border-top:1px solid var(--line);color:var(--faint);font-size:12.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;position:relative;z-index:1}
  .back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;margin-top:30px;transition:.18s}
  .back:hover{color:var(--green)}

.tl{cursor:pointer;border-bottom:1px dotted rgba(18,44,66,.28)}
.tl:hover{color:var(--green);border-bottom-color:var(--green)}
.profile-hd{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin:14px 0 2px}
.profile-hd h1{font-family:'Anton';font-weight:400;font-size:clamp(34px,6vw,62px);letter-spacing:1px;text-transform:uppercase;line-height:.95}
.profile-sub{color:var(--muted);font-size:14px}
.cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:13px;margin:20px 0}
.mini{background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line2);border-radius:14px;padding:15px}
.mini b{display:block;font-family:'Anton';font-size:27px;color:var(--gold);line-height:1}
.mini span{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);font-weight:700}
.sqchips{display:flex;flex-wrap:wrap;gap:9px}
.sqchip{background:var(--panel2);border:1px solid var(--line2);border-radius:20px;padding:8px 14px;font-weight:600;cursor:pointer;transition:.15s;border-bottom:1px solid var(--line2)}
.sqchip:hover{border-color:var(--green);color:var(--green)}
.sqchip small{color:var(--faint);font-weight:700;margin-left:7px;font-variant-numeric:tabular-nums}
.albo-season{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.albo-season .yr{font-family:'Anton';font-size:20px;color:var(--gold);margin-bottom:6px;letter-spacing:.5px}
.albo-row{display:flex;gap:8px;align-items:center;padding:4px 0;font-size:14px;flex-wrap:wrap}
.albo-row .c{color:var(--muted);min-width:150px;font-size:11.5px;letter-spacing:1px;text-transform:uppercase;font-weight:700}

img.crest{width:40px;height:40px;border-radius:50%;background:#fff;object-fit:contain;border:1px solid var(--line2);box-shadow:0 4px 12px -5px rgba(20,50,80,.45)}
.hero-wrap{position:relative;margin:24px 0 14px;border-radius:24px;overflow:hidden;isolation:isolate;background:linear-gradient(135deg,#0a3a2c 0%,#0a5e46 36%,#0a6f6a 62%,#123c6e 100%);box-shadow:0 34px 80px -34px rgba(8,50,55,.65)}
.hero-wrap::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;background:radial-gradient(620px 300px at 16% -10%,rgba(255,255,255,.18),transparent 60%),radial-gradient(520px 380px at 105% 120%,rgba(46,210,180,.34),transparent 60%),repeating-linear-gradient(118deg,rgba(255,255,255,.05) 0 2px,transparent 2px 28px)}
.hero-tri{position:absolute;top:0;left:0;right:0;height:5px;z-index:2;display:flex}
.hero-tri i{flex:1}.hero-tri i:nth-child(1){background:#16a34a}.hero-tri i:nth-child(2){background:#eef2f5}.hero-tri i:nth-child(3){background:#dc2626}
.hero-in{position:relative;z-index:1;display:flex;align-items:center;gap:42px;padding:48px 46px;flex-wrap:wrap}
.hero-logo{position:relative;flex-shrink:0}
.hero-logo img{width:160px;height:160px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,.9);box-shadow:0 0 0 9px rgba(255,255,255,.08),0 24px 54px -18px rgba(0,0,0,.55)}
.hero-logo::after{content:"";position:absolute;inset:-22px;border-radius:50%;background:radial-gradient(circle,rgba(46,210,180,.5),transparent 66%);z-index:-1;filter:blur(7px)}
.hero-txt{flex:1;min-width:286px;color:#fff}
.hero-eyebrow{font-family:'Archivo Narrow';letter-spacing:5px;text-transform:uppercase;font-size:13px;font-weight:700;color:#9ff0cf;margin-bottom:12px;display:flex;align-items:center;gap:13px;flex-wrap:wrap}
.hero-eyebrow .badge{font-family:'Anton';font-weight:400;font-size:clamp(18px,2.1vw,27px);line-height:1;letter-spacing:2px;background:linear-gradient(120deg,#ffd966,#f0a82a);color:#0a3a2c;border:0;border-radius:12px;padding:8px 16px 7px;box-shadow:0 10px 26px -8px rgba(255,180,40,.65);text-shadow:none;transform:translateY(-1px)}
.hero-txt h1{font-family:'Anton';font-weight:400;line-height:.84;font-size:clamp(46px,7.4vw,108px);letter-spacing:1px;text-transform:uppercase;text-shadow:0 8px 34px rgba(0,0,0,.32)}
.hero-txt h1 em{font-style:normal;color:#ffd24a;text-shadow:0 6px 22px rgba(255,180,40,.4)}
.hero-txt .lead{margin-top:18px;max-width:610px;color:rgba(255,255,255,.88);font-size:16px;line-height:1.56}
.hero-txt .lead b{color:#fff;font-weight:700}
.hero-stats{display:flex;gap:13px;flex-wrap:wrap;margin-top:28px}
.hstat{background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.2);border-radius:16px;padding:14px 20px;min-width:106px;backdrop-filter:blur(5px)}
.hstat b{display:block;font-family:'Anton';font-size:39px;line-height:1;color:#fff;letter-spacing:.5px;font-variant-numeric:tabular-nums}
.hstat span{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:#bfe9d8;font-weight:700;margin-top:7px;display:block}
@media(max-width:680px){.hero-in{padding:32px 22px;gap:24px}.hero-logo img{width:106px;height:106px}.hero-logo::after{inset:-14px}.hstat{padding:11px 15px;min-width:88px}.hstat b{font-size:30px}}

.champ-hero{position:relative;overflow:hidden;margin:14px 0 22px;border-radius:20px;padding:24px 30px;display:flex;align-items:center;gap:24px;background:linear-gradient(120deg,#0a3a2c 0%,#0a6e57 55%,#123c6e 100%);box-shadow:0 26px 60px -28px rgba(8,50,55,.6);isolation:isolate}
.champ-hero.top{margin-top:6px}
.champ-hero::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;background:radial-gradient(440px 220px at 10% -30%,rgba(255,210,74,.30),transparent 60%),radial-gradient(400px 260px at 102% 140%,rgba(46,210,180,.30),transparent 60%)}

const REGOLAMENTO = [{"t": "h1", "x": "PREMESSA"}, {"t": "p", "x": "La partecipazione a Fanta Soccer League è libera a richiesta ed è e sarà sempre totalmente gratuita."}, {"t": "p", "x": "Questo gioco deve essere affrontato con lo spirito del divertimento e della lealtà."}, {"t": "p", "x": "Essendo un gioco, inoltre, ha le sue regole che vanno seguite e rispettate, dall'inizio alla fine. Il rispetto delle regole è di vitale importanza per la trasparenza del gioco. Nonostante lo spirito di amicizia le regole valgono per tutti. Il gioco, seppur divertimento, deve essere serio purché riesca e faccia divertire nel migliore dei modi."}, {"t": "p", "x": "In osservanza dello spirito del gioco e nel rispetto degli altri partecipanti, ogni concorrente è tenuto, in ogni partita da lui disputata, ad inserire sempre la migliore formazione possibile, qualunque sia la posizione di classifica occupata o la \"situazione ambientale\" del momento."}, {"t": "p", "x": "Se si dovesse notare che questo viene meno (affinché non accadano in futuro situazioni del genere) si procederà con il prendere in considerazione severe e drastiche sanzioni (penalizzazioni in classifica o squalifiche) per il proseguo dell'attività fantacalcistica. Si conta nella buona fede di tutti."}, {"t": "p", "x": "Il presente regolamento, nonché il sistema di svolgimento delle competizioni, possono essere variate per qualsiasi motivo qualora si rendesse necessario. Vedi il numero degli iscritti, oppure problemi di tempo nell’organizzare le competizioni, o qualsivoglia altro motivo, il tutto a insindacabile discrezione del responsabile della Lega."}, {"t": "p", "x": "ARCHIVIO STORICO : http://storicofsl.altervista.org"}, {"t": "h1", "x": "MODALITA’ DI ISCRIZIONE"}, {"t": "p", "x": "L’iscrizione è obbligatoria per tutti coloro che intendono partecipare alla competizione."}, {"t": "p", "x": "Deve essere effettuata compilando il modulo presente sull’archivio storico alla voce “MODULO DI RICHIESTA DI ISCRIZIONE”."}, {"t": "p", "x": "Si precisa che, anche se si è già inseriti nella lega, la compilazione del modulo di cui sopra è assolutamente obbligatoria. In mancanza non si sarà inseriti in alcuna delle competizioni in programma. Infatti essere presenti nella LEGA FSL non implica l’automatica partecipazione alle competizioni."}, {"t": "p", "x": "Questo vale anche per i veterani poiché è necessario avere il controllo del numero dei partecipanti per ovvi motivi organizzativi"}, {"t": "p", "x": "Nel modulo di partecipazione dovrà essere inserito il numero di telefono whatsapp ai fini dell’inserimento nella chat “FSL-BACHECA UFFICIALE”. Questo è necessario perché tutte le comunicazioni saranno effettuate tramite whatsapp. Questa è una chat chiusa nella quale solo l’amministratore potrà postare le comunicazioni di volta in volta resesi necessarie."}, {"t": "p", "x": "Sull’archivio storico alla voce “MODULO DI RICHIESTA DI ISCRIZIONE”, saranno anche precisate le date di apertura e di chiusura delle iscrizioni."}, {"t": "h1", "x": "REGOLE DELLA CHAT APERTA DEL GRUPPO F.S.L. (Netiquette)"}, {"t": "p", "x": "La chat del gruppo FSL ha come scopo, quello di creare un luogo di ritrovo per tutti i partecipanti alle competizioni organizzate."}, {"t": "p", "x": "In questa chat si discute di calcio, di fantacalcio e di quant’altro, ma sempre con educazione e rispetto degli altri. Questo è anche il luogo dove si scherza, dove si fanno sani sfottò e, insomma, ci si diverte."}, {"t": "p", "x": "Le regole di carattere generale da tenere presente per interagire nella chat FSL sono le seguenti:"}, {"t": "li", "x": "curare la grammatica e la forma dei messaggi, per rendere più agevole la lettura e la comprensione del testo scritto;"}, {"t": "li", "x": "evitare di scrivere in MAIUSCOLO o in grassetto: questo tipo di carattere è associato ad un tono di prepotenza e arroganza che equivalgono al gridare;"}, {"t": "li", "x": "evitare di proferire insulti o bestemmie;"}, {"t": "li", "x": "cercare di essere sintetici e precisi;"}, {"t": "li", "x": "rimanere \"on topic\", ovvero \"in argomento\";"}, {"t": "li", "x": "evitare di condurre guerre personali in pubblico: si può continuare la conversazione in privato se proprio necessario;"}, {"t": "li", "x": "evitare di inviare SPAM, ovvero messaggi indesiderati, pubblicitari o non;"}, {"t": "li", "x": "rispettare le opinioni diverse dalle proprie;"}, {"t": "li", "x": "le opinioni considerate reato dalla Legge, vengono sanzionate dai moderatori come, a titolo di esempio, omofobia, razzismo, sessismo, …;"}, {"t": "li", "x": "non è consentito, poiché argomento divisivo, esporre pensieri ed opinioni riguardo la politica, o denigrare o fare apologia di qualsiasi indirizzo politico o ideologico;"}, {"t": "li", "x": "limitare quanto più possibile la pubblicazione di video e di messaggi vocali:"}, {"t": "li", "x": "non pubblicare contenuti inesatti, imprecisi o addirittura falsi. Quando si condivide una informazione è buona norma citare la fonte della notizia."}, {"t": "p", "x": "In breve il comportamento deve essere sempre improntato alla buona educazione e alla serena convivenza."}, {"t": "p", "x": "Chi volesse essere inserito nella chat di gruppo aperta, dovrà farne esplicita richiesta."}, {"t": "h1", "x": "STRUTTURA DELLA LEGA FSL"}, {"t": "p", "x": "La Fanta Soccer League, in seguito denominata FSL, è strutturata in competizioni come segue:"}, {"t": "h2", "x": "a) CAMPIONATO"}, {"t": "p", "x": "a.1)\tIn funzione del numero dei partecipanti sarà suddivisa in più serie fino a 4 con massimo 20 squadre per ciascuna serie."}, {"t": "p", "x": "Il campionato si assimila a quelli nazionali e prevedono 3 retrocessioni e, conseguentemente, 3 promozioni dalla serie inferiore."}, {"t": "p", "x": "Ranking unico per tutte le squadre."}, {"t": "p", "x": "Ogni Serie avrà un vincitore alla fine del campionato."}, {"t": "p", "x": "Ogni Serie vedrà assegnati i bonus di fine campionato."}, {"t": "p", "x": "a.2)\tNel caso in cui una o più squadre si ritirino dalla competizione della stagione successiva, si procederà al ripescaggio della squadra meglio classificata tra quelle retrocesse."}, {"t": "p", "x": "a.3)\tQualora le squadre ritiratesi fossero in numero superiore a quelle retrocesse, si procederà al ripescaggio delle migliori classificate fra le squadre della serie inferiore non promosse."}, {"t": "h2", "x": "b) COPPA DI LEGA"}, {"t": "p", "x": "La Coppa di lega si svolgerà secondo la formula della Champions League."}, {"t": "p", "x": "Pertanto le fasi saranno le seguenti."}, {"t": "h2", "x": "b.1) FASE PRELIMINARE"}, {"t": "p", "x": "Tutte le squadre saranno ammesse a disputare questa fase."}, {"t": "p", "x": "Se le squadre sono in numero dispari, quella con il ranking più basso sarà esclusa."}, {"t": "p", "x": "Si disputerà un unico girone e ogni squadra sfiderà otto avversarie in gara unica, per un totale di otto giornate."}, {"t": "p", "x": "Gli accoppiamenti saranno sorteggiate dall’algoritmo della piattaforma."}, {"t": "p", "x": "La classifica sarà unica e le prime otto sono ammesse agli ottavi di finale come teste di serie."}, {"t": "h2", "x": "b.2) FASE PLAYOFF"}, {"t": "p", "x": "Le squadre classificate dal 9^ al 24^ posto disputeranno i playoff consistenti in gara ad eliminazione di andata e ritorno."}, {"t": "p", "x": "Gli accoppiamenti saranno del tipo: la 9^ contro la 24^, la 10^ contro la 23^, …., la 15^ contro la 18^, la 16^ contro la 17^."}, {"t": "p", "x": "Le vincitrici saranno ammesse agli ottavi."}, {"t": "p", "x": "Le squadre classificate dal 25^ posto in poi saranno eliminate."}, {"t": "h2", "x": "b.3) FASE FINALE"}, {"t": "p", "x": "Le squadre qualificate si scontreranno con partite di andata e ritorno a partire dagli ottavi."}, {"t": "p", "x": "Quindi si procederà con gli ottavi, con i quarti, con le semifinali e quindi con le finali per il 1° e per il 2° posto."}, {"t": "p", "x": "Tutte le gare saranno disputate con andata e ritorno."}, {"t": "p", "x": "Tutte le date saranno comunicate prima dell’inizio della competizione."}, {"t": "h1", "x": "c) COPPA DEI CAMPIONI DI LEGA FSL"}, {"t": "p", "x": "Questa coppa sarà disputata nella stagione successiva a quella in corso poiché è legata alla classifica finale di detta stagione."}, {"t": "p", "x": "A partire dalla stagione 2024-2025 questa coppa si disputerà secondo la seguente formula."}, {"t": "p", "x": "Caso di una sola Serie : le prime OTTO classificate sono ammesse alla fase di quarti, semifinale e finale ad eliminazione."}, {"t": "p", "x": "Caso di due Serie : le prime SEI classificate di ciascuna serie saranno inserite in 2 gironi composti ciascuno da 6 squadre. Le prime quattro di ogni girone sono ammesse alla fase di quarti di finale, semifinale e finale ad eliminazione."}, {"t": "p", "x": "Caso di tre Serie : le prime SEI classificate di ciascuna serie, più le DUE migliori settime, saranno inserite in 4 gironi composti ciascuno da 5 squadre. Le prime quattro di ogni girone passano alla fase di ottavi di finale, quarti di finale, semifinale e finale ad eliminazione."}, {"t": "p", "x": "Caso di quattro Serie : le prime SEI classificate di ciascuna serie saranno inserite in 4 gironi composti ciascuno da sei squadre. Le prime quattro di ogni girone passano alla fase di ottavi di finale, quarti di finale, semifinale e finale ad eliminazione."}, {"t": "p", "x": "I gironi saranno composti mediante il sorteggio effettuato con l’ausilio dell’algoritmo della piattaforma di gioco."}, {"t": "h1", "x": "d) SUPERCOPPA INTERLEGA"}, {"t": "p", "x": "La Super Coppa Interlega, sarà cosa distinta e separata. Si giocherà sempre sulla piattaforma di Fantacalcio.it, ma sarà una lega distinta e separata dalla FSL."}, {"t": "p", "x": "La partecipazione sarà libera e a richiesta pur nei limiti numerici previsti."}, {"t": "h1", "x": "PRECISAZIONE"}, {"t": "p", "x": "Per l'attribuzione dei gol, degli assist, delle ammonizioni, delle espulsioni, delle autoreti, dei ruoli e di tutto quanto concerne la valutazione dei calciatori, l'unica fonte sarà FANTACALCIO."}, {"t": "p", "x": "Altresì per tutti i casi particolari e no che dovessero accadere, unica fonte sarà FANTACALCIO."}, {"t": "h1", "x": "Art. 1 – OPZIONI ROSE"}, {"t": "h2", "x": "Art. 1.a – Generali"}, {"t": "p", "x": "Ogni utente avrà a disposizione 250 crediti per l'acquisto dei 25 calciatori della propria rosa. Sono consentiti giocatori comuni a più squadre e le rose saranno invisibili agli altri utenti."}, {"t": "h2", "x": "Art. 1.b – Composizione rose"}, {"t": "p", "x": "Ogni squadra sarà formata da 25 calciatori così suddivisi:"}, {"t": "li", "x": "n. 3 portieri"}, {"t": "li", "x": "n. 8 difensori"}, {"t": "li", "x": "n. 8 centrocampisti"}, {"t": "li", "x": "n. 6 attaccanti"}, {"t": "h1", "x": "Art. 2 – OPZIONI FORMAZIONI"}, {"t": "h2", "x": "Art. 2.a – Inserimento formazione"}, {"t": "p", "x": "Il termine ultimo per la consegna della formazione è previsto a 15 minuti prima dell'inizio della prima partita della giornata."}, {"t": "p", "x": "La formazione dovrà essere schierata secondo i seguenti schemi di gioco consentiti:"}, {"t": "li", "x": "3 – 4 – 3"}, {"t": "li", "x": "3 – 5 – 2"}, {"t": "li", "x": "4 – 5 – 1"}, {"t": "li", "x": "4 – 4 – 2"}, {"t": "li", "x": "4 – 3 – 3"}, {"t": "li", "x": "5 – 4 – 1"}, {"t": "li", "x": "5 – 3 – 2"}, {"t": "p", "x": "Ogni utente può decidere se rendere invisibile la formazione schierata agli altri fino al momento della consegna delle formazioni."}, {"t": "h2", "x": "Art. 2.b - Composizione panchina"}, {"t": "p", "x": "Si adotta la panchina lunga. I calciatori in panchina saranno tutti quelli non schierati come titolari con sequenza libera e con cambio modulo ove necessario."}, {"t": "h2", "x": "Art. 2.c – Sostituzioni con cambio modulo"}, {"t": "p", "x": "Il numero massimo di sostituzioni è di 5 calciatori."}, {"t": "p", "x": "Le sostituzioni sono fatte in ordine di schieramento in panchina, conservando il modulo prescelto per la giornata. Qualora non fosse possibile in questo modo, si passa a vedere, sempre nell'ordine di panchina, se è possibile fare entrare un panchinaro cambiando modulo, sempre che il modulo sia uno di quelli consentiti. In ogni caso è prioritario il modulo iniziale e solo se non ci sono panchinari utili per conservare questo modulo, si procederà al cambio modulo."}, {"t": "p", "x": "Esempio :"}, {"t": "p", "x": "Gioco con 3-5-2. Non mi gioca un centrocampista e non ne ho altri in panchina che abbiano giocato. Giocherei, quindi, in 10."}, {"t": "p", "x": "Non potendo mantenere il modulo 3-5-2 si passa allora a controllare, sempre in ordine di panchina, la eventuale presenza di giocatori che abbiano giocato."}, {"t": "p", "x": "Se ho per primo giocatore giocante un attaccante, il modulo verrà corretto in 3-4-3 e giocherò in 11."}, {"t": "p", "x": "Se invece ho per primo giocatore giocante un difensore, il modulo verrà corretto in 4-4-2 e giocherò in 11."}, {"t": "h2", "x": "Art. 2.d – Mancato inserimento della formazione"}, {"t": "p", "x": "Se la formazione non fosse consegnata nel tempo stabilito, verrà recuperata l'ultima formazione consegnata se esistente."}, {"t": "h1", "x": "Art. 3 - OPZIONI DI CALCOLO"}, {"t": "h2", "x": "Art. 3.a - Bonus e Malus"}, {"t": "h2", "x": "Art. 3.b - Fonte voti"}, {"t": "p", "x": "Sia per i voti che per i cartellini la fonte sarà FANTACALCIO."}, {"t": "h2", "x": "Art. 3.c - Soglie gol"}, {"t": "p", "x": "La soglia minima dei voti che dà diritto al primo gol è di 66. Una somma voti inferiore a 66 equivale a zero gol. A partire da 66 (che dà diritto ad 1 gol), ogni 6 punti scatterà un gol aggiuntivo."}, {"t": "h1", "x": "Art. 4 - CASO DI PARITA' IN CLASSIFICA"}, {"t": "p", "x": "L'ordine di posizione in classifica generale della competizione a calendario, sarà stabilito seguendo nell'ordine i seguenti criteri:"}, {"t": "li", "x": "Punti in classifica;"}, {"t": "li", "x": "Classifica avulsa"}, {"t": "li", "x": "Somma totale voti;"}, {"t": "li", "x": "Differenza reti;"}, {"t": "li", "x": "Gol fatti;"}, {"t": "li", "x": "Gol subiti."}, {"t": "p", "x": "Per le finali delle competizioni parallele (Coppa di Lega, Coppa dei Campioni, ….), i criteri di ordinamento saranno i seguenti:"}, {"t": "li", "x": "Risultato degli incontri;"}, {"t": "li", "x": "Supplementari e rigori."}, {"t": "li", "x": "Somma voti degli incontri;"}, {"t": "p", "x": "Saranno attribuiti:"}, {"t": "li", "x": "Per la vittoria 3 punti"}, {"t": "li", "x": "Per il pareggio 1 punto"}, {"t": "li", "x": "Per la sconfitta 0 punti"}, {"t": "h1", "x": "Art. 5 – GUIDA AI SUPPLEMENTARI E RIGORI"}, {"t": "p", "x": "Estratto dal regolamento di Fantacalcio.it"}, {"t": "h2", "x": "Art. 5.a - SUPPLEMENTARI"}, {"t": "p", "x": "Criterio: per ogni squadra il numero di reti realizzate nel supplementare è dato da una tabella di conversione che valuta la fantamedia (aritmetica) di tutti i panchinari non subentrati in campo."}, {"t": "p", "x": "Regole: nel calcolo della fantamedia non vengono conteggiati i portieri presenti in panchina e devono esserci almeno due voti validi tra i panchinari non subentrati in campo (con uno o nessuno il punteggio della squadra sarà zero)."}, {"t": "p", "x": "N.B. In caso di sfide andata/ritorno rimane valido, come nella realtà, il criterio dei goal fuori casa. Esempio: sfida finita 1-1 all'andata e 1-1 al ritorno. Si va ai supplementari e il punteggio diventa 2-2. A quel punto si qualifica la squadra che ha giocato il ritorno in trasferta viste le 2 reti all'attivo nella seconda sfida. Questo criterio non è ovviamente valido in caso di finale secca."}, {"t": "h2", "x": "Art. 5.b - RIGORI"}, {"t": "p", "x": "Criterio: se, dopo i supplementari, si è ancora in parità, si va ai calci di rigore. Il calciatore realizza un calcio di rigore quando il suo voto netto (quindi privo di bonus e malus di qualsiasi tipo) è maggiore o uguale a 6. Lo sbaglia se è inferiore a 6. Ogni squadra tirerà 5 calci di rigore, in caso di ulteriore parità si andrà avanti ad oltranza con delle serie da un rigore a testa che, come nella realtà, si interrompono quando una delle squadre andrà avanti nel punteggio"}, {"t": "p", "x": "Ordinamento dei rigoristi: va stabilito dal fantallenatore solo indirettamente, poiché sarà indissolubilmente legato allo schieramento della formazione."}, {"t": "p", "x": "Nelle leghe Classic l'ordine dei tiratori è:"}, {"t": "p", "x": "- attaccanti schierati nella formazione titolare se con voto valido (in ordine di come li avete schierati)"}, {"t": "p", "x": "- centrocampisti schierati nella formazione titolare se con voto valido (in ordine di come li avete schierati)"}, {"t": "p", "x": "- difensori schierati nella formazione titolare se con voto valido (in ordine di come li avete schierati)"}, {"t": "p", "x": "- portiere schierato nella formazione titolare se con voto valido"}, {"t": "p", "x": "- riserve subentrate con voto valido (secondo ordine di panchina)."}, {"t": "h1", "x": "Art. 6 – FATTORE CAMPO"}, {"t": "p", "x": "Nella competizione a calendario la squadra che gioca in casa avrà a suo favore un fattore campo di +2 punti da sommare ai voti della formazione che ha giocato."}, {"t": "p", "x": "Tale fattore campo sarà attribuito anche nelle fasi a girone delle competizioni parallele, mentre non sarà più attribuito nelle fasi finali ad eliminazione diretta."}, {"t": "h1", "x": "Art. 7 - ALTRI CASI"}, {"t": "p", "x": "Per tutti i casi non previsti fin qui, facciamo riferimento al regolamento ufficiale di “FANTACALCIO”."}, {"t": "h1", "x": "Art. 8 - MERCATO INIZIALE O MERCATO ESTIVO"}, {"t": "p", "x": "Il mercato è di tipo libero. I giocatori possono essere posseduti da qualsiasi squadra. Fa parte delle abilità dei fantallenatori trovare nomi che facciano la differenza."}, {"t": "p", "x": "La fase iniziale del mercato servirà alla composizione della rosa iniziale."}, {"t": "p", "x": "L’apertura della fase iniziale sarà effettuata non appena disponibili le liste dei calciatori con le relative quotazioni."}, {"t": "p", "x": "La chiusura della fase iniziale avverrà, in linea di massima, la settimana successiva alla chiusura del mercato ufficiale."}, {"t": "p", "x": "Per gli acquisti saranno disponibili 250 Crediti ai quali vanno sommati i crediti che ciascuna squadra avrà guadagnato nella stagione precedente."}, {"t": "p", "x": "In questo periodo si potranno fare acquisti e cessioni senza alcun limite di numero, ma solo economico."}, {"t": "p", "x": "Questo per consentire di mettere a punto la rosa iniziale anche sfruttando gli ultimi colpi del mercato ufficiale."}, {"t": "p", "x": "In questa fase di mercato le cessioni che si andranno a fare saranno valutate al valore di acquisto."}, {"t": "p", "x": "Si devono acquistare 25 calciatori, così suddivisi per ruolo :"}, {"t": "li", "x": "N. 3 portieri"}, {"t": "li", "x": "N. 8 difensori"}, {"t": "li", "x": "N. 8 centrocampisti"}, {"t": "li", "x": "N. 6 attaccanti"}, {"t": "p", "x": "Le quotazioni utilizzate saranno quelle ufficiali di \"FANTACALCIO”."}, {"t": "h1", "x": "Art. 9 – MERCATO CHIUSO"}, {"t": "p", "x": "Alla fine della fase di mercato iniziale, il mercato sarà definitivamente chiuso e non sarà più possibile effettuare altre operazioni."}, {"t": "h1", "x": "Art. 10 - MERCATO INVERNALE"}, {"t": "p", "x": "Le date di apertura e chiusura delle operazioni di mercato saranno ufficializzate mediante comunicato sui nostri canali ufficiali."}, {"t": "p", "x": "Per gli acquisti saranno disponibili i crediti eventualmente residui dal mercato estivo, senza altri abbuoni se non quelli eventualmente derivanti dall’eventuale aumento della valutazione dei calciatori che si intende cedere."}, {"t": "p", "x": "Si ricorda che in questo periodo si può effettuare un numero massimo di cambi pari a 10, comunque entro i limiti economici disponibili, e che le cessioni che si andranno a fare saranno valutate al valore che il calciatore ha in quel momento e non più al valore di acquisto."}, {"t": "p", "x": "Le quotazioni utilizzate saranno quelle ufficiali di \"FANTACALCIO\"."}, {"t": "h1", "x": "Art. 11 – CALCIATORI TRASFERITI"}, {"t": "p", "x": "Sono esclusi dal computo del numero dei cambi disponibili i calciatori \"trasferiti\" i quali possono sempre essere ceduti anche se si è raggiunto il limite massimo di cambi consentito."}, {"t": "p", "x": "Questo vale entro il range di date durante le quali il mercato è aperto."}, {"t": "h1", "x": "Art. 12 – RANKING FSL"}, {"t": "p", "x": "A partire dalla fine del campionato 2015-2016, è stato applicato un nuovo criterio di calcolo del ranking delle squadre partecipanti alla FSL."}, {"t": "p", "x": "Infatti, per rendere la valutazione più similare possibile a quella delle squadre reali, sarà preso ad esempio il sistema di calcolo del ranking della FIFA per le nazionali, opportunamente modificato per le nostre competizioni."}, {"t": "p", "x": "Tale sistema di calcolo si applica agli scontri di campionato e alle partite di coppa."}, {"t": "p", "x": "Saranno prese in considerazione solo le ultime 5 stagioni compresa quella corrente."}, {"t": "p", "x": "Il punteggio ranking di ciascuna squadra sarà calcolato secondo la seguente formula:"}, {"t": "p", "x": "P = R * Fa * T – Fp"}, {"t": "p", "x": "Dove :"}, {"t": "p", "x": "P = punteggio ranking"}, {"t": "p", "x": "R = Risultato della partita"}, {"t": "li", "x": "Vittoria = 3 punti"}, {"t": "li", "x": "Pareggio = 1 punto"}, {"t": "li", "x": "Sconfitta = 0 punti"}, {"t": "p", "x": "Fa = Forza dell’avversario data dalla seguente formula:"}, {"t": "li", "x": "Forza avversario = (100 - Posizione Ranking Avversario) / 50"}, {"t": "li", "x": "con due sole eccezioni :"}, {"t": "li", "x": "se l'avversario è classificato al 1º posto, gli viene assegnato un moltiplicatore pari a 2;"}, {"t": "li", "x": "se l'avversario è classificato al 75º posto (o al di sotto di tale posizione), gli viene assegnato un moltiplicatore minimo pari a 0,5."}, {"t": "p", "x": "T = peso delle partite più recenti, il cui valore ranking varrà secondo il seguente schema:"}, {"t": "li", "x": "partite della stagione in corso  \t100%"}, {"t": "li", "x": "partite della stagione precedente \t75%"}, {"t": "li", "x": "partite di due stagioni fa  \t50%"}, {"t": "li", "x": "partite di tre stagioni fa  \t25%"}, {"t": "li", "x": "partite di quattro stagioni fa  \t10%"}, {"t": "p", "x": "Fp = Forza propria della squadra perdente data dalla stessa formula di cui sopra per il calcolo di Fa."}, {"t": "p", "x": "Il calcolo del valore Ranking di ciascuna squadra varierà ad ogni incontro poichè la classifica sarà aggiornata per ogni partita che sarà giocata. La classifica, pertanto, potrà variare da una giornata all'altra."}, {"t": "p", "x": "Questo sistema vuole premiare le squadre che maggiormente si distinguono non solo per i risultati, ma anche per la presenza nel tempo, in quanto è evidente che una squadra può anche uscire dalla classifica ranking."}, {"t": "p", "x": "Le nuove squadre che entrano, saranno tutte classificate in coda alla classifica e occuperanno l’ultima posizione disponibile tutte alla pari."}, {"t": "h1", "x": "Art. 13 – CREDITI BONUS"}, {"t": "p", "x": "Per premiare le squadre che maggiormente si sono distinte in stagione è stabilito un bonus crediti da sommare ai crediti base assegnati per la stagione successiva."}, {"t": "p", "x": "Inoltre è previsto un bonus beneaugurante per le squadre che retrocedono."}, {"t": "h1", "x": "Art. 14 – PENALITA’"}, {"t": "h2", "x": "Art. 14.a – Mancato inserimento ripetitivo della formazione"}, {"t": "p", "x": "La squadra che nel corso della competizione non dovesse schierare la formazione ripetutamente, sarà estromessa dalla stagione salvo eventuali ulteriori sanzioni sportive che potrebbero essere comminate per la stagione in via di svolgimento."}, {"t": "h2", "x": "Art. 14.b – Mercato iniziale non effettuato o non completato"}, {"t": "p", "x": "La squadra che, per qualsivoglia motivo, non dovesse iniziare o completare il mercato iniziale entro la data di chiusura, avrà sconfitta a tavolino per tutte le gare della competizione e subirà la cancellazione dalla stagione successiva."}, {"t": "p", "x": "Se possibile può essere sostituita da altra squadra."}];

const BASE_COLS=[

 {k:'vf',l:'Fatti',g:'Voti tot.',num:1,get:(x,e)=>e.vf},{k:'vs',l:'Subiti',g:'Voti tot.',num:1,get:(x,e)=>e.vs},
 {k:'hvf',l:'Fatti',g:'Voti casa',num:1,get:(x,e)=>e.hvf},{k:'hvs',l:'Subiti',g:'Voti casa',num:1,get:(x,e)=>e.hvs},
 {k:'avf',l:'Fatti',g:'Voti tras.',num:1,get:(x,e)=>e.avf},{k:'avs',l:'Subiti',g:'Voti tras.',num:1,get:(x,e)=>e.avs}
];
const extCache={};
function leagueExt(L){const ck=CUR+'|'+L.key;if(ck in extCache)return extCache[ck];
  if(!L.cal||!Object.keys(L.cal).length){extCache[ck]=null;return null;}
  const E={};const g=t=>E[t]||(E[t]={hg:0,hv:0,hn:0,hp:0,hgf:0,hgs:0,ag:0,av:0,an:0,ap:0,agf:0,ags:0,hvf:0,hvs:0,avf:0,avs:0});
  Object.values(L.cal).forEach(rnd=>rnd.forEach(m=>{const h=m[0],a=m[1],hg=m[2],ag=m[3],hp=m[4]||0,ap=m[5]||0;const H=g(h),Aw=g(a);
    H.hg++;H.hgf+=hg;H.hgs+=ag;H.hvf+=hp;H.hvs+=ap;if(hg>ag)H.hv++;else if(hg<ag)H.hp++;else H.hn++;
    Aw.ag++;Aw.agf+=ag;Aw.ags+=hg;Aw.avf+=ap;Aw.avs+=hp;if(ag>hg)Aw.av++;else if(ag<hg)Aw.ap++;else Aw.an++;}));
  const r1=v=>Math.round(v*10)/10;
  Object.values(E).forEach(e=>{e.vf=r1(e.hvf+e.avf);e.vs=r1(e.hvs+e.avs);e.hvf=r1(e.hvf);e.hvs=r1(e.hvs);e.avf=r1(e.avf);e.avs=r1(e.avs);});
  extCache[ck]=E;return E;}
function zoneLegend(rows){

  if(z.has('champions'))out.push('<span><i style="background:var(--green)"></i> Qualificazione Coppa Campioni</span>');
  if(z.has('promo'))out.push('<span><i style="background:linear-gradient(var(--green),var(--gold))"></i> Promozione</span>');
  if(z.has('relegation'))out.push('<span><i style="background:var(--red)"></i> Retrocessione</span>');
  return out.join('');
}
function renderClass(k){
  const L=D().leagues.find(x=>x.key===k),st=state[k];const E=leagueExt(L);
  const cols=E?BASE_COLS.concat(EXT_COLS):BASE_COLS;

  if(st.q){const q=st.q.toLowerCase();r=r.filter(x=>x[1].toLowerCase().includes(q));}
  if(st.sort){const col=cols.find(c=>c.k===st.sort);if(col&&col.get){r.sort((a,b)=>{let av=col.get(a,E&&E[a[1]]),bv=col.get(b,E&&E[b[1]]);return (typeof av==='string')?av.localeCompare(bv)*st.dir:((av||0)-(bv||0))*st.dir;});}}
  let head;
  if(E){let grp='',colr='',i=0;
    while(i<cols.length){const c=cols[i];
      if(!c.g){grp+=`<th rowspan="2" class="${c.c||''} ${st.sort===c.k?'sorted':''}" onclick="sortClass('${k}','${c.k}')">${c.l}<span class="ar">${st.sort===c.k?(st.dir>0?'\u25b2':'\u25bc'):''}</span></th>`;i++;}
      else{let jj=i;while(jj<cols.length&&cols[jj].g===c.g)jj++;grp+=`<th colspan="${jj-i}" class="grp">${c.g}</th>`;
        for(let q=i;q<jj;q++){const cc=cols[q];colr+=`<th class="${cc.c||''} ${st.sort===cc.k?'sorted':''}" onclick="sortClass('${k}','${cc.k}')">${cc.l}<span class="ar">${st.sort===cc.k?(st.dir>0?'\u25b2':'\u25bc'):''}</span></th>`;}
        i=jj;}}
    head=`<tr>${grp}</tr><tr>${colr}</tr>`;
  }else{head='<tr>'+cols.map(c=>`<th class="${c.c||''} ${st.sort===c.k?'sorted':''}" onclick="sortClass('${k}','${c.k}')">${c.l}<span class="ar">${st.sort===c.k?(st.dir>0?'\u25b2':'\u25bc'):''}</span></th>`).join('')+'</tr>';}
  const body=r.map(x=>{const e=E?E[x[1]]:null;const z=x[9]?'z-'+x[9]:'';
    let tds='';cols.forEach(c=>{const v=c.get?c.get(x,e):'';
      if(c.k==='pos')tds+=`<td class="pos"><span class="pos-wrap"><span class="zbar"></span>${v}</span></td>`;
      else if(c.k==='team')tds+=`<td class="team">${tl(x[1])}</td>`;

      else tds+=`<td>${v==null?'\u2013':v}</td>`;});
    return `<tr class="${z}">${tds}</tr>`;}).join('');
  const minw=E?1240:680;
  document.getElementById('tbl-'+k).innerHTML=`<table style="min-width:${minw}px"><thead>${head}</thead><tbody>${body}</tbody></table>`;
  const lg=document.getElementById('leg-'+k); if(lg)lg.innerHTML=zoneLegend(L.generale);
}
function sortClass(k,key){const st=state[k];if(st.sort===key)st.dir*=-1;else{st.sort=key;const col=BASE_COLS.concat(EXT_COLS).find(c=>c.k===key);st.dir=(col&&(col.str||col.k==='pos'))?1:-1;}renderClass(k);}

function computeStandings(cal,upto){const T={};const g=t=>T[t]||(T[t]={team:t,g:0,v:0,n:0,p:0,gf:0,gs:0,pt:0});
  for(let d=1;d<=upto;d++){(cal[d]||[]).forEach(m=>{const[h,a,hg,ag]=m;const H=g(h),A=g(a);
    H.g++;A.g++;H.gf+=hg;H.gs+=ag;A.gf+=ag;A.gs+=hg;
    if(hg>ag){H.v++;A.p++;H.pt+=3;}else if(hg<ag){A.v++;H.p++;A.pt+=3;}else{H.n++;A.n++;H.pt++;A.pt++;}});}
  return Object.values(T).sort((x,y)=>y.pt-x.pt||(y.gf-y.gs)-(x.gf-x.gs)||y.gf-x.gf||x.team.localeCompare(y.team));}
function buildExp(k){

}

function stepG(k,d){const n=Object.keys(D().leagues.find(x=>x.key===k).cal).length;gcur[k]=Math.min(n,Math.max(1,gcur[k]+d));document.getElementById('gs-'+k).value=gcur[k];renderG(k);}

function buildAndamento(k){
  const L=D().leagues.find(x=>x.key===k);if(!L||!L.cal)return;const ck=CUR+'|'+k;
  if(!andData[ck]){
    const teams=L.generale.map(r=>r[1]);const N=Object.keys(L.cal).length;

  const body=g.rows.map(r=>{const dg=r[6]-r[7];return `<tr><td class="pos">${r[0]}</td><td class="team">${tl(r[1])}</td><td class="pts">${r[8]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[6]}</td><td>${r[7]}</td><td class="dg ${dg>0?'pos-v':dg<0?'neg-v':''}">${dg>0?'+':''}${dg}</td><td style="color:var(--muted)">${num(r[9])}</td></tr>`;}).join('');
  return `<div><div class="grp-title">Girone ${g.name}</div><div class="table-wrap"><div class="scroll"><table style="min-width:560px"><thead>${head}</thead><tbody>${body}</tbody></table></div></div></div>`;
}
const PCOLS=[{l:'#',c:'pos'},{l:'Squadra',c:'team lft'},{l:'Pt',c:'pts'},{l:'Fase',c:'lft'}];
function renderPrelim(k){
  const C=D().cups.find(x=>x.key===k),P=C.prelim,st=state[k];let r=P.rows.map(x=>x.slice());
  if(st.q){const q=st.q.toLowerCase();r=r.filter(x=>x[1].toLowerCase().includes(q));}
  if(st.sort!==null){const i=st.sort;r.sort((a,b)=>{let av=a[i],bv=b[i];return typeof av==='string'?av.localeCompare(bv)*st.dir:(av-bv)*st.dir;});}
  const head='<tr>'+PCOLS.map((c,i)=>`<th class="${c.c||''} ${st.sort===i?'sorted':''}" onclick="sortPre('${k}',${i})">${c.l}<span class="ar">${st.sort===i?(st.dir>0?'\u25b2':'\u25bc'):''}</span></th>`).join('')+'</tr>';
  const body=r.map(x=>`<tr class="z-${x[3]}"><td class="pos"><span class="pos-wrap"><span class="zbar"></span>${x[0]}</span></td><td class="team">${tl(x[1])}</td><td class="pts">${num(x[2])}</td><td class="team" style="color:var(--muted);font-weight:600">${(P.lbl&&P.lbl[x[3]])||x[3]}</td></tr>`).join('');
  document.getElementById('tbl-'+k).innerHTML=`<table style="min-width:520px"><thead>${head}</thead><tbody>${body}</tbody></table>`;
  const lg=document.getElementById('legc-'+k);
  if(lg){const items=[];if(P.lbl&&P.lbl.ottavi)items.push('<span><i style="background:var(--green)"></i> '+P.lbl.ottavi+'</span>');if(P.lbl&&P.lbl.playoff)items.push('<span><i style="background:var(--gold)"></i> '+P.lbl.playoff+'</span>');if(P.lbl&&P.lbl.elim)items.push('<span><i style="background:var(--red)"></i> '+P.lbl.elim+'</span>');lg.innerHTML=items.join('');}
}
function sortPre(k,i){const st=state[k];if(st.sort===i)st.dir*=-1;else{st.sort=i;st.dir=(i===2)?-1:1;}renderPrelim(k);}
function renderCup(C){
  if(C.knockout&&C.knockout.length){const e=document.getElementById('fin-'+C.key);if(e)e.innerHTML=renderKnockout(C.knockout);}
  if(C.gironi&&C.gironi.length){const e=document.getElementById('gir-'+C.key);if(e)e.innerHTML=`<div class="groups">${C.gironi.map(gironeTable).join('')}</div>`;}
  if(C.playoff){const e=document.getElementById('pl-'+C.key);if(e){
    const ties=`<div class="round"><h3>Spareggi Playoff</h3><div class="ties">${C.playoff.ties.map(tieHTML).join('')}</div></div>`;
    const qual=`<div class="qual"><h4>Qualificate alla Fase Finale</h4><div class="chips">${C.playoff.qualified.map(t=>`<span class="chip">${tl(t)}</span>`).join('')}</div></div>`;
    e.innerHTML='<div class="rounds">'+ties+'</div>'+qual;}}
  if(C.prelim)renderPrelim(C.key);
}

/* ===== ranking ===== */
const RK_COLS=[{l:'#',c:'pos'},{l:'Squadra',c:'team lft'},{l:'Ranking',c:'pts'},{l:'\u0394',c:''}];
function allTimeRanking(){const ks=Object.keys(SEASONS).sort();for(let i=ks.length-1;i>=0;i--){const r=SEASONS[ks[i]].ranking;if(r&&r.generale&&r.generale.length)return {data:r.generale,season:SEASONS[ks[i]].meta.label};}return {data:[],season:''};}
function renderRK(){
  const st=state.RK; st.key='generale'; st.sort=null;
  const wrap=document.getElementById('rk-wrap');const AT=allTimeRanking();
  if(!AT.data.length){wrap.innerHTML=`<div class="qual"><h4>Dati non disponibili</h4><p style="color:var(--muted)">Il ranking generale all-time non \u00e8 ancora stato caricato.</p></div>`;return;}
  wrap.innerHTML=`<div class="controls"><div class="panel-title" style="margin:0">Ranking Generale \u00b7 All-Time</div>
    <div class="search" style="margin-left:auto"><span class="mag">&#9906;</span><input placeholder="Cerca squadra&hellip;" oninput="filt('RK',this.value)"></div></div>
    <div class="table-wrap"><div class="scroll"><div id="tbl-RK"></div></div></div>
    <div class="legend"><span><i style="background:var(--green)"></i> In risalita</span><span><i style="background:var(--red)"></i> In calo</span><span><i style="background:var(--faint)"></i> Stabile</span></div>
    <p style="color:var(--faint);font-size:12px;margin-top:10px">Classifica storica unica della Lega, indipendente dalla stagione selezionata \u00b7 aggiornata alla stagione ${AT.season}.</p>`;
  renderRKtable();
}
function renderRKtable(){
  const st=state.RK;const data=allTimeRanking().data;const e0=document.getElementById('tbl-RK');if(!e0)return;if(!data.length){e0.innerHTML='';return;}let r=data.map(x=>x.slice());
  if(st.q){const q=st.q.toLowerCase();r=r.filter(x=>x[1].toLowerCase().includes(q));}
  if(st.sort!==null){const i=st.sort;r.sort((a,b)=>{let av=a[i],bv=b[i];return typeof av==='string'?av.localeCompare(bv)*st.dir:(av-bv)*st.dir;});}
  const head='<tr>'+RK_COLS.map((c,i)=>`<th class="${c.c||''} ${st.sort===i?'sorted':''}" onclick="sortRK(${i})">${c.l}<span class="ar">${st.sort===i?(st.dir>0?'\u25b2':'\u25bc'):''}</span></th>`).join('')+'</tr>';
  const body=r.map(x=>{const dd=x[3];const dc=dd>0?'up':dd<0?'down':'eq';const dt=dd>0?('\u25b2 '+dd):dd<0?('\u25bc '+Math.abs(dd)):'=';return `<tr><td class="pos">${x[0]}</td><td class="team">${tl(x[1])}</td><td class="pts">${num(x[2])}</td><td><span class="delta ${dc}">${dt}</span></td></tr>`;}).join('');
  document.getElementById('tbl-RK').innerHTML=`<table style="min-width:480px"><thead>${head}</thead><tbody>${body}</tbody></table>`;
}
function sortRK(i){const st=state.RK;if(st.sort===i)st.dir*=-1;else{st.sort=i;st.dir=(i>=2)?-1:1;}renderRKtable();}

function filt(k,v){state[k].q=v;if(D().leagues.find(x=>x.key===k))renderClass(k);else if(k==='RK')renderRKtable();else renderPrelim(k);}

/* ===== tabs binding ===== */
function bindTabs(){
  const d=D();
  d.leagues.forEach(L=>{const box=document.getElementById('tabs-'+L.key);box.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    box.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    document.getElementById('class-'+L.key).style.display=b.dataset.k==='classifica'?'block':'none';
    const ex=document.getElementById('exp-'+L.key);if(ex)ex.style.display=b.dataset.k==='esplora'?'block':'none';
    const an=document.getElementById('and-'+L.key);if(an)an.style.display=b.dataset.k==='andamento'?'block':'none';
    const sx=document.getElementById('stat-'+L.key);if(sx)sx.style.display=b.dataset.k==='stat'?'block':'none';
    document.getElementById('srch-'+L.key).style.display=b.dataset.k==='classifica'?'flex':'none';
    if(b.dataset.k==='andamento')buildAndamento(L.key);
    if(b.dataset.k==='stat')buildStat(L.key);});});
  d.cups.forEach(C=>{const box=document.getElementById('tabs-'+C.key);if(!box)return;box.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    box.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    ['fin','gir','pl','pre'].forEach(p=>{const e=document.getElementById(p+'-'+C.key);if(e)e.style.display='none';});
    const map={finale:'fin',gironi:'gir',playoff:'pl',prelim:'pre'};
    const e=document.getElementById(map[b.dataset.k]+'-'+C.key);if(e)e.style.display='block';
    const sr=document.getElementById('srch-'+C.key);if(sr)sr.style.display=b.dataset.k==='prelim'?'flex':'none';});});
}

/* ===== PROFILO SQUADRA / ALBO / SQUADRE ===== */
function allTeams(){
  const set=new Set();
  Object.values(SEASONS).forEach(s=>{
    s.leagues.forEach(L=>L.generale.forEach(r=>set.add(r[1])));
    s.cups.forEach(C=>{(C.gironi||[]).forEach(g=>g.rows.forEach(r=>set.add(r[1])));
      if(C.champion)set.add(C.champion);
      (C.knockout||[]).forEach(rn=>rn.ties.forEach(t=>t.legs.forEach(l=>{set.add(l[0]);set.add(l[1]);})));
      if(C.prelim)C.prelim.rows.forEach(r=>set.add(r[1]));});
  });
  return [...set].filter(Boolean).sort((a,b)=>a.localeCompare(b));
}
function teamStats(name){
  const o={name,seasons:[],titles:[],matches:[],tot:{g:0,v:0,n:0,p:0,gf:0,gs:0,pt:0},first:null,last:null,best:null};
  Object.keys(SEASONS).sort().forEach(sk=>{
    const s=SEASONS[sk];let appeared=false;
    s.leagues.forEach(L=>{
      const row=L.generale.find(r=>r[1]===name);
      if(row){appeared=true;
        o.seasons.push({season:sk,comp:L.name,pos:row[0],nteams:L.generale.length,pt:row[2],g:row[3],v:row[4],n:row[5],p:row[6],gf:row[7],gs:row[8],title:row[0]===1});
        o.tot.g+=row[3];o.tot.v+=row[4];o.tot.n+=row[5];o.tot.p+=row[6];o.tot.gf+=row[7];o.tot.gs+=row[8];o.tot.pt+=row[2];
        if(o.best===null||row[0]<o.best.pos)o.best={pos:row[0],season:sk,comp:L.name};
        Object.entries(L.cal||{}).forEach(([gd,ms])=>ms.forEach(m=>{
          if(m[0]===name)o.matches.push({season:sk,comp:L.name,opp:m[1],gf:m[2],ga:m[3],home:true});
          else if(m[1]===name)o.matches.push({season:sk,comp:L.name,opp:m[0],gf:m[3],ga:m[2],home:false});}));
      }});
    s.cups.forEach(C=>{
      if(C.champion===name)appeared=true;
      (C.knockout||[]).forEach(rn=>rn.ties.forEach(t=>t.legs.forEach(l=>{
        if(l[0]===name){appeared=true;o.matches.push({season:sk,comp:C.name,opp:l[1],gf:l[2],ga:l[3],home:true,cup:true});}
        else if(l[1]===name){appeared=true;o.matches.push({season:sk,comp:C.name,opp:l[0],gf:l[3],ga:l[2],home:false,cup:true});}})));
      (C.gironi||[]).forEach(g=>{const r=g.rows.find(x=>x[1]===name);if(r)appeared=true;});
    });
    if(appeared){if(o.first===null)o.first=sk;o.last=sk;}
  });
  o.titles=officialTitles(name);
  return o;
}
function openTeam(name){renderTeam(name);go('TEAM');window.scrollTo({top:0,behavior:'smooth'});}
function renderTeam(name){
  const o=teamStats(name),t=o.tot;
  const valid=o.matches.filter(m=>typeof m.gf==='number'&&typeof m.ga==='number');
  let recHTML='';
  if(valid.length){
    const byTot=[...valid].sort((a,b)=>(b.gf+b.ga)-(a.gf+a.ga))[0];
    const wins=valid.filter(m=>m.gf>m.ga);
    const byMargin=wins.length?[...wins].sort((a,b)=>(b.gf-b.ga)-(a.gf-a.ga))[0]:null;
    const byScored=[...valid].sort((a,b)=>b.gf-a.gf)[0];
    const mk=(m,lbl,score)=>`<div class="albo-row"><span class="c">${lbl}</span><b style="color:var(--gold);font-family:'Anton'">${score}</b> &nbsp;vs ${tl(m.opp)} <span style="color:var(--faint);font-size:12px">(${SEASONS[m.season].meta.label} \u00b7 ${m.comp})</span></div>`;
    recHTML='<div class="qual"><h4>Record (dalle gare disponibili)</h4>'+
      mk(byTot,'Gara con pi\u00f9 gol',byTot.gf+'-'+byTot.ga)+

  } else {
    recHTML='<div class="qual"><h4>Record</h4><p style="color:var(--muted)">Dettaglio partita non disponibile per le stagioni di questo club (solo classifiche).</p></div>';
  }
  const span=o.first===o.last?(o.first?SEASONS[o.first].meta.label:'\u2013'):`${SEASONS[o.first].meta.label} \u2013 ${SEASONS[o.last].meta.label}`;
  const palm=o.titles.length?o.titles.map(ti=>`<span class="chip">${CATICO[ti.cat]||'\ud83c\udfc6'} ${ti.cat} <small style="color:var(--faint)">${seasLabel(ti.season)}</small></span>`).join(''):'<span style="color:var(--muted)">Nessun titolo nell\'albo.</span>';
  const seasonRows=o.seasons.map(x=>{const dg=x.gf-x.gs;return `<tr><td class="team" style="font-weight:600">${SEASONS[x.season].meta.label}</td><td class="team" style="color:var(--muted)">${x.comp}</td><td class="pos">${x.pos}\u00b0${x.title?' \ud83c\udfc6':''}</td><td>${x.g}</td><td>${x.v}</td><td>${x.n}</td><td>${x.p}</td><td>${x.gf}</td><td>${x.gs}</td><td class="dg ${dg>0?'pos-v':dg<0?'neg-v':''}">${dg>0?'+':''}${dg}</td><td class="pts">${x.pt}</td></tr>`;}).join('');
  const media=t.g?(t.pt/t.g).toFixed(2).replace('.',','):'\u2013';
  document.getElementById('team-wrap').innerHTML=`
    <div class="profile-hd"><h1>${name}</h1><span class="profile-sub">${span} \u00b7 ${o.seasons.length} stagioni di lega</span></div>
    <div class="cardgrid">
      <div class="mini"><b>${o.titles.length}</b><span>Titoli</span></div>
      <div class="mini"><b>${t.v}</b><span>Vittorie</span></div>
      <div class="mini"><b>${t.n}</b><span>Pareggi</span></div>
      <div class="mini"><b>${t.p}</b><span>Sconfitte</span></div>
      <div class="mini"><b>${t.gf}</b><span>Gol fatti</span></div>
      <div class="mini"><b>${t.gs}</b><span>Gol subiti</span></div>
      <div class="mini"><b>${media}</b><span>Media punti</span></div>
      <div class="mini"><b>${o.best?o.best.pos+'\u00b0':'\u2013'}</b><span>Miglior piazz.</span></div>
    </div>
    <div class="qual"><h4>Palmar\u00e8s</h4><div class="chips">${palm}</div></div>
    ${recHTML}
    <div class="panel-title" style="margin-top:22px">Stagione per stagione (lega)</div>
    <div class="table-wrap"><div class="scroll"><table style="min-width:640px"><thead><tr><th class="lft">Stagione</th><th class="lft">Competizione</th><th class="pos">Pos</th><th>G</th><th>V</th><th>N</th><th>P</th><th>GF</th><th>GS</th><th>DG</th><th class="pts">Pt</th></tr></thead><tbody>${seasonRows||'<tr><td colspan="11" style="color:var(--muted);text-align:center;padding:18px">Nessuna stagione di lega (solo coppe).</td></tr>'}</tbody></table></div></div>`;
}
function compCat(c){
  c=String(c);
  if(/coppa di lega|coppa fsl/i.test(c))return 'Coppa di Lega';
  if(/coppa campioni|coppa dei campioni|champions/i.test(c))return 'Coppa Campioni';
  if(/serie c/i.test(c))return 'Serie C';
  if(/serie b|div\.?\s*b|divisione b/i.test(c))return 'Serie B';
  return 'Serie A';
}
const CATICO={'Serie A':'\ud83c\udfc6','Serie B':'\ud83c\udfc6','Serie C':'\ud83c\udfc6','Coppa di Lega':'\ud83d\udee1\ufe0f','Coppa Campioni':'\u2b50','Torneo Open':'\ud83c\udfaf','Super Coppa':'\ud83c\udf0d'};
function officialTitles(name){
  const out=[];const A=(typeof ALBO_UFF!=='undefined')?ALBO_UFF:null;if(!A)return out;
  A.camp.forEach(c=>['A','B','C'].forEach(d=>{if(c[d]===name)out.push({season:c.season,cat:'Serie '+d});}));
  A.cl.forEach(c=>{if(c.win===name)out.push({season:c.season,cat:'Coppa di Lega'});});
  A.cc.forEach(c=>{if(c.win===name)out.push({season:c.season,cat:'Coppa Campioni'});});
  A.to.forEach(c=>{if(c.win===name)out.push({season:c.season,cat:'Torneo Open'});});
  (A.sci||[]).forEach(c=>{if(c.win===name)out.push({season:c.season,cat:'Super Coppa'});});
  out.sort((a,b)=>a.season.localeCompare(b.season));
  return out;
}
function renderAlbo(){
  const A=(typeof ALBO_UFF!=='undefined')?ALBO_UFF:{camp:[],cl:[],cc:[],to:[]};
  const have=new Set(allTeams());const tlIf=n=>have.has(n)?tl(n):n;
  const CATS=['Serie A','Serie B','Serie C','Coppa di Lega','Coppa Campioni','Torneo Open','Super Coppa'];
  const M={};const add=(t,cat)=>{if(!t)return;(M[t]=M[t]||{});M[t][cat]=(M[t][cat]||0)+1;};
  A.camp.forEach(c=>{add(c.A,'Serie A');add(c.B,'Serie B');add(c.C,'Serie C');});
  A.cl.forEach(c=>add(c.win,'Coppa di Lega'));A.cc.forEach(c=>add(c.win,'Coppa Campioni'));A.to.forEach(c=>add(c.win,'Torneo Open'));(A.sci||[]).forEach(c=>add(c.win,'Super Coppa'));
  const cols=CATS.filter(cat=>Object.values(M).some(m=>m[cat]));
  const divCols=cols.filter(c=>c==='Serie A'||c==='Serie B'||c==='Serie C');
  const othCols=cols.filter(c=>!(c==='Serie A'||c==='Serie B'||c==='Serie C'));
  const cfsl=m=>(m['Serie A']||0)+(m['Serie B']||0)+(m['Serie C']||0);
  const dot='<span style="color:var(--faint)">\u00b7</span>';
  const cY=v=>v?'<b style="color:var(--gold)">'+v+'</b>':dot;
  const cG=v=>v?'<b style="color:var(--green)">'+v+'</b>':dot;
  const rows=Object.entries(M).map(([team,m])=>({team,m,tot:cols.reduce((a,c)=>a+(m[c]||0),0),cf:cfsl(m)}))
    .sort((a,b)=>b.cf-a.cf||(b.m['Coppa di Lega']||0)-(a.m['Coppa di Lega']||0)||(b.m['Coppa Campioni']||0)-(a.m['Coppa Campioni']||0)||(b.m['Torneo Open']||0)-(a.m['Torneo Open']||0)||(b.m['Super Coppa']||0)-(a.m['Super Coppa']||0)||b.tot-a.tot||a.team.localeCompare(b.team));
  const head='<tr><th class="pos">#</th><th class="lft">Squadra</th><th class="pts">Camp. FSL</th>'+divCols.map(c=>`<th>${c}</th>`).join('')+othCols.map(c=>`<th>${c}</th>`).join('')+'<th class="pts">Tot</th></tr>';
  const body=rows.map((r,i)=>`<tr><td class="pos">${i+1}</td><td class="team">${tlIf(r.team)}</td>`+
    `<td class="pts" style="color:var(--green)">${r.cf?'<b>'+r.cf+'</b>':dot}</td>`+
    divCols.map(c=>`<td>${cY(r.m[c])}</td>`).join('')+
    othCols.map(c=>`<td>${cG(r.m[c])}</td>`).join('')+
    `<td class="pts" style="color:var(--blue)"><b>${r.tot}</b></td></tr>`).join('');
  const board=`<div class="table-wrap"><div class="scroll"><table style="min-width:600px"><thead>${head}</thead><tbody>${body}</tbody></table></div></div>`;
  const seasons=[...new Set([].concat(A.camp.map(c=>c.season),A.cl.map(c=>c.season),A.cc.map(c=>c.season),A.to.map(c=>c.season),(A.sci||[]).map(c=>c.season)))].sort().reverse();
  const timeline=seasons.map(sk=>{
    const cm=A.camp.find(c=>c.season===sk)||{};const L=[];
    if(cm.A)L.push(['\ud83c\udfc6 Serie A',cm.A]);if(cm.B)L.push(['\ud83c\udfc6 Serie B',cm.B]);if(cm.C)L.push(['\ud83c\udfc6 Serie C',cm.C]);
    const lg=A.cl.find(c=>c.season===sk);if(lg)L.push(['\ud83d\udee1\ufe0f Coppa di Lega',lg.win]);
    const ch=A.cc.find(c=>c.season===sk);if(ch)L.push(['\u2b50 Coppa Campioni',ch.win]);
    const op=A.to.find(c=>c.season===sk);if(op)L.push(['\ud83c\udfaf Torneo Open',op.win]);
    const sci=(A.sci||[]).find(c=>c.season===sk);if(sci)L.push(['\ud83c\udf0d Super Coppa Interlega',sci.win]);
    const badge=SEASONS[sk]?'':' <span style="font-size:10.5px;color:var(--gold);font-family:\'Archivo Narrow\';letter-spacing:1px;border:1px solid rgba(240,189,59,.4);padding:1px 7px;border-radius:10px">SOLO ALBO</span>';
    const ed=cm.ed?` <span style="font-size:12px;color:var(--muted);font-family:'Archivo Narrow';letter-spacing:1px">${cm.ed}\u00aa ed.</span>`:'';
    const rws=L.map(([c,w])=>`<div class="albo-row"><span class="c">${c}</span>${tlIf(w)}</div>`).join('');
    return `<div class="albo-season"><div class="yr">${seasLabel(sk)}${ed}${badge}</div>${rws}</div>`;
  }).join('');
  let punti='';
  if(typeof PUNTI_CAPOLISTA!=='undefined'){
    const b=PUNTI_CAPOLISTA.map((r,i)=>`<tr><td class="pos">${i+1}</td><td class="team" style="font-weight:600">${r[0]}</td><td class="pos">${r[1]||'\u2013'}</td><td class="team">${tlIf(r[2])}</td><td class="pts">${r[3]}</td></tr>`).join('');
    punti=`<div class="panel-title" style="margin-top:26px">Punti record della squadra vincente</div>
      <div class="table-wrap"><div class="scroll"><table style="min-width:460px"><thead><tr><th class="pos">#</th><th class="lft">Stagione</th><th class="pos">Serie</th><th class="lft">Squadra</th><th class="pts">Punti</th></tr></thead><tbody>${b}</tbody></table></div></div>`;
  }
  let sciPanel='';
  if(A.sci&&A.sci.length){
    const sb=A.sci.slice().sort((a,b)=>b.ed-a.ed).map(c=>`<tr><td class="pos">${c.ed}\u00aa</td><td class="team" style="font-weight:600">${seasLabel(c.season)}</td><td class="team"><b style="color:var(--green)">${tlIf(c.win)}</b></td><td class="team" style="color:var(--muted)">${c.fin?tlIf(c.fin):'\u2013'}</td></tr>`).join('');
    sciPanel=`<div class="panel-title" style="margin-top:26px">\ud83c\udf0d SuperCoppa Interlega</div>
      <div class="legend" style="margin:2px 0 10px"><span>Trofeo assegnato tra vincitrici di leghe diverse (interlega) \u00b7 ${A.sci.length} edizioni</span></div>
      <div class="table-wrap"><div class="scroll"><table style="min-width:460px"><thead><tr><th class="pos">Ed.</th><th class="lft">Stagione</th><th class="lft">Vincitrice</th><th class="lft">Finalista</th></tr></thead><tbody>${sb}</tbody></table></div></div>`;
  }
document.getElementById('albo-wrap').innerHTML=`
    <div class="panel-title">Bacheca dei trofei <span style="font-size:11px;color:var(--faint);font-family:'Archivo Narrow';letter-spacing:1px">\u00b7 albo ufficiale</span></div>${board}
    <div class="legend" style="margin-top:10px"><span>Fonte: albo d'oro ufficiale FSL \u00b7 include stagioni/competizioni non ancora complete nell'archivio (badge <b style="color:var(--gold)">SOLO ALBO</b>)</span></div>
    <div class="panel-title" style="margin-top:26px">Stagione per stagione</div>${timeline}
    ${sciPanel}
    ${punti}`;
}
function renderSquadre(filter){
  const q=(filter||'').toLowerCase();
  const counts={};
  allTeams().forEach(t=>counts[t]=0);
  Object.values(SEASONS).forEach(s=>s.leagues.forEach(L=>L.generale.forEach(r=>{counts[r[1]]=(counts[r[1]]||0)+1;})));
  const list=allTeams().filter(t=>t.toLowerCase().includes(q));
  document.getElementById('sq-wrap').innerHTML=`<div class="sqchips">`+list.map(t=>`<span class="sqchip tl" data-team="${esc(t)}">${t}<small>${counts[t]||0}</small></span>`).join('')+`</div>`+
    `<p style="color:var(--faint);margin-top:14px;font-size:12px">${list.length} squadre \u00b7 il numero indica le stagioni di lega disputate</p>`;
}

function renderRegolamento(){
  const wrap=document.getElementById('reg-wrap');if(!wrap||typeof REGOLAMENTO==='undefined')return;
  let toc=[],body='',sec=-1;
  REGOLAMENTO.forEach(b=>{
    if(b.t==='h1'){sec++;const id='reg-s'+sec;if(sec>0)body+='</div>';toc.push(`<a onclick="document.getElementById('${id}').scrollIntoView({behavior:'smooth',block:'start'})">${esc(b.x)}</a>`);body+=`<div class="reg-sec" id="${id}"><h3 class="reg-h1">${esc(b.x)}</h3>`;}
    else if(b.t==='h2')body+=`<h4 class="reg-h2">${esc(b.x)}</h4>`;
    else if(b.t==='li')body+=`<div class="reg-li">${esc(b.x)}</div>`;
    else body+=`<p class="reg-p">${esc(b.x)}</p>`;
  });
  if(sec>=0)body+='</div>';
  wrap.innerHTML=`<div class="reg-grid"><nav class="reg-toc">${toc.join('')}</nav><div class="reg-body">${body}</div></div>`;
}
function loadSeason(key){
  CUR=key; state={RK:{key:'generale',q:'',sort:null,dir:1}}; gcur={};
  D().leagues.forEach(L=>state[L.key]={q:'',sort:null,dir:1});
  D().cups.forEach(C=>state[C.key]={q:'',sort:null,dir:1});
  buildShell(); applyHome(); bindTabs();
  D().leagues.forEach(L=>{renderClass(L.key);if(L.cal&&Object.keys(L.cal).length)buildExp(L.key);});
  D().cups.forEach(C=>renderCup(C));
  renderRK(); renderAlbo(); renderSquadre(); renderRegolamento();
  go('home');
}

(function init(){
  document.addEventListener('click',e=>{const el=e.target.closest('.tl');if(el)openTeam(el.getAttribute('data-team'));});
  const sel=document.getElementById('seasonSelect');
  sel.innerHTML=Object.keys(SEASONS).sort().reverse().map(k=>`<option value="${k}">${SEASONS[k].meta.label}</option>`).join('');
  sel.value=CUR; loadSeason(CUR);
})();

</script></body></html>
